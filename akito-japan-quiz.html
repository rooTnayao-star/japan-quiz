<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彰人の日本一周</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #e0f2fe 0%, #fef9c3 50%, #dcfce7 100%);
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.card { background:#fff; border-radius:24px; padding:28px 20px; box-shadow:0 8px 32px rgba(0,0,0,0.12); max-width:420px; width:100%; }
.quiz-card { background:#fff; border-radius:24px; padding:18px 16px; box-shadow:0 8px 32px rgba(0,0,0,0.12); max-width:480px; width:100%; }
.screen { display:none; }
.screen.active { display:block; }

.title-emoji { font-size:60px; text-align:center; display:block; margin-bottom:8px; }
h1.title { font-size:36px; font-weight:900; color:#1e3a5f; text-align:center; line-height:1.2; margin-bottom:8px; letter-spacing:.04em; }
.title-sub { text-align:center; color:#64748b; font-size:14px; margin-bottom:20px; }
.toggle-row { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
.toggle-btn { padding:8px 14px; border-radius:20px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; }
.toggle-btn.on { background:#dbeafe; color:#1d4ed8; border:none; }
.toggle-btn.off { background:#f9fafb; color:#9ca3af; border:2px solid #e5e7eb; }

.big-btn { width:100%; padding:15px 0; border-radius:16px; border:none; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:#fff; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 4px 12px rgba(59,130,246,.35); margin-bottom:10px; font-family:inherit; }
.sub-btn { width:100%; padding:12px 0; border-radius:14px; border:2px solid #e2e8f0; background:#f8fafc; color:#475569; font-size:14px; font-weight:700; cursor:pointer; margin-bottom:8px; font-family:inherit; }
.back-btn { width:100%; padding:10px 0; border-radius:12px; border:none; background:transparent; color:#94a3b8; font-size:13px; cursor:pointer; font-family:inherit; }
h2.heading { font-size:20px; font-weight:900; color:#1e3a5f; text-align:center; margin-bottom:18px; }

.mode-btn { width:100%; display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:16px; border:2px solid #e2e8f0; background:#f8fafc; cursor:pointer; margin-bottom:10px; text-align:left; font-family:inherit; }
.mode-btn-emoji { font-size:30px; flex-shrink:0; }
.mode-btn-label { font-weight:800; font-size:15px; color:#1e3a5f; }
.mode-btn-desc { font-size:12px; color:#64748b; margin-top:2px; }

.progress-wrap { height:8px; border-radius:4px; background:#e2e8f0; overflow:hidden; margin-bottom:8px; }
.progress-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,#3b82f6,#06b6d4); transition:width .4s ease; }
.quiz-meta { display:flex; justify-content:space-between; margin-bottom:10px; align-items:center; }
.q-num { font-size:13px; color:#64748b; font-weight:600; }
.score-chip { background:#fef9c3; border:1px solid #fcd34d; border-radius:20px; padding:3px 10px; font-size:13px; font-weight:700; color:#92400e; }

.q-text { text-align:center; font-size:15px; color:#374151; font-weight:600; margin-bottom:10px; line-height:1.6; }
.pref-name-big { font-size:26px; font-weight:900; color:#1e3a5f; display:block; margin-bottom:4px; }

/* シルエット */
.silhouette-wrap { background:#eff6ff; border-radius:14px; padding:10px 8px; margin-bottom:12px; min-height:160px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.silhouette-wrap svg { width:100%; max-height:200px; display:block; }

/* 地図 */
.map-wrap { width:100%; position:relative; }
.map-wrap > svg { width:100%; max-height:320px; display:block; }
.geolonia-svg-map .prefecture { cursor:pointer; transition:fill .2s; }
.geolonia-svg-map .prefecture:hover path,
.geolonia-svg-map .prefecture:hover polygon { opacity:.85; }

/* 選択肢 */
.choices-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.choice-btn { padding:13px 8px; border-radius:12px; border:2px solid #e2e8f0; background:#f8fafc; font-size:14px; font-weight:700; color:#1e3a5f; cursor:pointer; line-height:1.4; font-family:inherit; }
.choice-btn.correct { border-color:#4ade80; background:#dcfce7; color:#166534; cursor:default; }
.choice-btn.wrong   { border-color:#f87171; background:#fee2e2; color:#991b1b; cursor:default; }
.choice-btn.neutral { color:#9ca3af; cursor:default; }

.fb { text-align:center; padding:10px 16px; border-radius:12px; font-weight:800; font-size:15px; margin:10px 0; }
.fb.correct { background:#dcfce7; color:#166534; }
.fb.wrong   { background:#fee2e2; color:#991b1b; font-size:13px; font-weight:700; }

.next-btn { width:100%; padding:14px 0; border-radius:14px; border:none; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:#fff; font-size:16px; font-weight:900; cursor:pointer; box-shadow:0 4px 12px rgba(59,130,246,.3); margin-top:6px; font-family:inherit; }

.result-circle { width:120px; height:120px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#06b6d4); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 8px; box-shadow:0 6px 20px rgba(59,130,246,.4); }
.result-score { font-size:44px; font-weight:900; color:#fff; line-height:1; }
.result-total { font-size:16px; color:rgba(255,255,255,.8); }
.result-msg { text-align:center; font-size:22px; font-weight:800; color:#1e3a5f; margin:12px 0 16px; }
.stats-row { display:flex; justify-content:space-around; padding:14px 0; border-top:1px solid #f1f5f9; border-bottom:1px solid #f1f5f9; margin-bottom:16px; }
.stat-item { text-align:center; }
.stat-icon { font-size:22px; }
.stat-val { font-size:24px; font-weight:900; color:#1e3a5f; }
.stat-label { font-size:11px; color:#64748b; }

.scores-list { max-height:340px; overflow-y:auto; }
.score-row { display:flex; align-items:center; gap:10px; padding:10px 8px; border-bottom:1px solid #f1f5f9; }
.score-rank { font-size:12px; color:#94a3b8; width:28px; font-weight:700; }
.score-info { flex:1; }
.score-mode { font-size:13px; font-weight:700; color:#1e3a5f; }
.score-date { font-size:11px; color:#94a3b8; }
.score-result { font-size:16px; font-weight:800; }
.score-result .ok { color:#4ade80; }
.score-result .tot { color:#9ca3af; font-size:13px; }

ruby rt { font-size:.6em; color:#6b7280; }
</style>
</head>

    <button class="mode-btn" onclick="startGame(47)">
      <span class="mode-btn-emoji">🗾</span>
      <div><div class="mode-btn-label">日本一周モード</div><div class="mode-btn-desc">47都道府県ぜんぶ！</div></div>
    </button>
    <button class="back-btn" onclick="showScreen('menu')">← もどる</button>
  </div>
</div>

<!-- クイズ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-card">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="quiz-meta">
      <span class="q-num" id="q-num"></span>
      <span class="score-chip" id="score-chip">⭐ 0</span>
    </div>
    <div id="quiz-content"></div>
    <button class="next-btn" id="btn-next" style="display:none" onclick="nextQuestion()">つぎ →</button>
  </div>
</div>

<!-- けっか -->
<div id="screen-result" class="screen">
  <div class="card">
    <h2 class="heading">けっか</h2>
    <div class="result-circle">
      <div class="result-score" id="result-score"></div>
      <div class="result-total" id="result-total"></div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-icon">✅</div><div class="stat-val" id="stat-correct"></div><div class="stat-label">せいかい</div></div>
      <div class="stat-item"><div class="stat-icon">❌</div><div class="stat-val" id="stat-wrong"></div><div class="stat-label">まちがい</div></div>
      <div class="stat-item"><div class="stat-icon">📊</div><div class="stat-val" id="stat-pct"></div><div class="stat-label">せいかいりつ</div></div>
    </div>
    <button class="big-btn" onclick="showScreen('menu')">もういちど</button>
    <button class="sub-btn" onclick="showScores()">📊 きろくをみる</button>
    <button class="back-btn" onclick="showScreen('title')">タイトルへ</button>
  </div>
</div>

<!-- きろく -->
<div id="screen-scores" class="screen">
  <div class="card">
    <h2 class="heading">📊 きろく</h2>
    <div id="scores-list"></div>
    <button class="back-btn" onclick="showScreen('title')">← もどる</button>
  </div>
</div>

<script>
const PREFECTURES = [
  {id:1,name:"北海道",ruby:"ほっかいどう"},{id:2,name:"青森県",ruby:"あおもりけん"},
  {id:3,name:"岩手県",ruby:"いわてけん"},{id:4,name:"宮城県",ruby:"みやぎけん"},
  {id:5,name:"秋田県",ruby:"あきたけん"},{id:6,name:"山形県",ruby:"やまがたけん"},
  {id:7,name:"福島県",ruby:"ふくしまけん"},{id:8,name:"茨城県",ruby:"いばらきけん"},
  {id:9,name:"栃木県",ruby:"とちぎけん"},{id:10,name:"群馬県",ruby:"ぐんまけん"},
  {id:11,name:"埼玉県",ruby:"さいたまけん"},{id:12,name:"千葉県",ruby:"ちばけん"},
  {id:13,name:"東京都",ruby:"とうきょうと"},{id:14,name:"神奈川県",ruby:"かながわけん"},
  {id:15,name:"新潟県",ruby:"にいがたけん"},{id:16,name:"富山県",ruby:"とやまけん"},
  {id:17,name:"石川県",ruby:"いしかわけん"},{id:18,name:"福井県",ruby:"ふくいけん"},
  {id:19,name:"山梨県",ruby:"やまなしけん"},{id:20,name:"長野県",ruby:"ながのけん"},
  {id:21,name:"岐阜県",ruby:"ぎふけん"},{id:22,name:"静岡県",ruby:"しずおかけん"},
  {id:23,name:"愛知県",ruby:"あいちけん"},{id:24,name:"三重県",ruby:"みえけん"},
  {id:25,name:"滋賀県",ruby:"しがけん"},{id:26,name:"京都府",ruby:"きょうとふ"},

  {id:37,name:"香川県",ruby:"かがわけん"},{id:38,name:"愛媛県",ruby:"えひめけん"},
  {id:39,name:"高知県",ruby:"こうちけん"},{id:40,name:"福岡県",ruby:"ふくおかけん"},
  {id:41,name:"佐賀県",ruby:"さがけん"},{id:42,name:"長崎県",ruby:"ながさきけん"},
  {id:43,name:"熊本県",ruby:"くまもとけん"},{id:44,name:"大分県",ruby:"おおいたけん"},
  {id:45,name:"宮崎県",ruby:"みやざきけん"},{id:46,name:"鹿児島県",ruby:"かごしまけん"},
  {id:47,name:"沖縄県",ruby:"おきなわけん"}
];

let soundOn=true, rubyOn=true, currentMode=null;
let questions=[], qIndex=0, score=0, wrongCount=0;
let answered=false, selectedId=null, currentChoices=[];

// SVGテンプレートを取得
const svgTemplate = document.getElementById('svg-template').querySelector('svg');

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function getChoices(correct,count=4){
  const others=shuffle(PREFECTURES.filter(p=>p.id!==correct.id)).slice(0,count-1);
  const result=shuffle([correct,...others]);
  currentChoices=result.map(c=>c.id);
  return result;
}

function rubyText(name,ruby){
  if(!rubyOn)return name;
  return `<ruby>${name}<rp>(</rp><rt>${ruby}</rt><rp>)</rp></ruby>`;
}

function playSound(type){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='correct'){
      o.frequency.setValueAtTime(523,ctx.currentTime);
      o.frequency.setValueAtTime(659,ctx.currentTime+.1);
      o.frequency.setValueAtTime(784,ctx.currentTime+.2);
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      o.start();o.stop(ctx.currentTime+.5);
    }else{
      o.frequency.setValueAtTime(330,ctx.currentTime);
      o.frequency.setValueAtTime(220,ctx.currentTime+.15);
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      o.start();o.stop(ctx.currentTime+.4);
    }
  }catch(e){}
}

const STORAGE_KEY='akito_quiz_v6';
function loadScores(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];}}
function saveScore(e){const s=loadScores();s.unshift(e);localStorage.setItem(STORAGE_KEY,JSON.stringify(s.slice(0,50)));}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function toggleSound(){soundOn=!soundOn;const b=document.getElementById('btn-sound');b.textContent=soundOn?'🔊 音ON':'🔇 音OFF';b.className='toggle-btn '+(soundOn?'on':'off');}
function toggleRuby(){rubyOn=!rubyOn;const b=document.getElementById('btn-ruby');b.textContent=rubyOn?'あ ルビあり':'あ ルビなし';b.className='toggle-btn '+(rubyOn?'on':'off');}
function selectMode(m){currentMode=m;showScreen('count');}

function startGame(count){
  questions=shuffle(PREFECTURES).slice(0,count);
  qIndex=0;score=0;wrongCount=0;answered=false;selectedId=null;
  showScreen('quiz');renderQuestion();
}

// SVGクローンを生成して色とイベントを設定
function buildMap(highlightId, answeredFlag, correctId, selId, clickable){
  const clone=svgTemplate.cloneNode(true);
  clone.setAttribute('width','100%');
  clone.style.cssText='max-height:300px;display:block;';

  clone.querySelectorAll('.prefecture').forEach(pref=>{
    const code=parseInt(pref.getAttribute('data-code'),10);
    if(!code)return;
    let fill='#7dd3fc',stroke='#ffffff',sw='1';
    if(answeredFlag){
      if(code===correctId){fill='#4ade80';stroke='#16a34a';sw='2';}
      else if(code===selId){fill='#f87171';stroke='#dc2626';sw='2';}
      else{fill='#bfdbfe';}
    }else if(code===highlightId){
      fill='#fbbf24';stroke='#f59e0b';sw='2';
    }
    pref.querySelectorAll('path,polygon,rect,circle').forEach(el=>{
      el.setAttribute('fill',fill);
      el.setAttribute('stroke',stroke);
      el.setAttribute('stroke-width',sw);
    });
    if(clickable){
      pref.style.cursor='pointer';
      pref.addEventListener('click',()=>{
        const p=PREFECTURES.find(x=>x.id===code);
        if(p)handleAnswer(p.id);
      });
    }
  });

  const wrap=document.createElement('div');
  wrap.className='map-wrap';
  wrap.appendChild(clone);
  return wrap;
}

// シルエット：対象県だけ拡大表示
// 各都道府県のviewBox（SVG変換行列から精密計算済み）

function buildSilhouette(prefId){
  const clone=svgTemplate.cloneNode(true);
  clone.setAttribute('width','100%');
  clone.style.cssText='max-height:200px;display:block;';

  clone.querySelectorAll('.prefecture').forEach(pref=>{
    const code=parseInt(pref.getAttribute('data-code'),10);
    if(code===prefId){
      pref.querySelectorAll('path,polygon,rect,circle').forEach(el=>{
        el.setAttribute('fill','#1e40af');
        el.setAttribute('stroke','#93c5fd');
        el.setAttribute('stroke-width','3');
      });
    }else{
      pref.style.display='none';
    }
  });
  const bl=clone.querySelector('.boundary-line');
  if(bl)bl.style.display='none';

  // 事前計算したviewBoxを適用（BBox不要）
  const vb = PREF_VIEWBOX[prefId] || '0 0 1000 1000';
  clone.setAttribute('viewBox', vb);

  const wrap=document.createElement('div');
  wrap.className='silhouette-wrap';
  wrap.appendChild(clone);
  return wrap;
}

function renderQuestion(){
  const cur=questions[qIndex];
  const total=questions.length;
  document.getElementById('progress-bar').style.width=((qIndex+1)/total*100)+'%';
  document.getElementById('q-num').textContent=(qIndex+1)+' / '+total+'もん';
  document.getElementById('score-chip').textContent='⭐ '+score;
  document.getElementById('btn-next').style.display='none';

  const choices=getChoices(cur);
  const content=document.getElementById('quiz-content');
  content.innerHTML='';

  if(currentMode==='silhouette'){
    const p=document.createElement('p');p.className='q-text';
    p.innerHTML='この'+rubyText('形','かたち')+'はどこの'+rubyText('都道府県','とどうふけん')+'？';
    content.appendChild(p);
    content.appendChild(buildSilhouette(cur.id));
    content.appendChild(buildChoiceGrid(choices,cur));

  }else if(currentMode==='mapFind'){
    const p=document.createElement('p');p.className='q-text';
    p.innerHTML='<span class="pref-name-big">'+rubyText(cur.name,cur.ruby)+'</span>はどこ？地図をタップ！';
    content.appendChild(p);
    content.appendChild(buildMap(null,false,null,null,true));

  }else if(currentMode==='mapName'){
    const p=document.createElement('p');p.className='q-text';
    p.innerHTML=rubyText('黄色','きいろ')+'の'+rubyText('場所','ばしょ')+'はどこの'+rubyText('都道府県','とどうふけん')+'？';
    content.appendChild(p);
    content.appendChild(buildMap(cur.id,false,null,null,false));
    content.appendChild(buildChoiceGrid(choices,cur));
  }
}

function buildChoiceGrid(choices,cur){
  const grid=document.createElement('div');grid.className='choices-grid';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=rubyText(c.name,c.ruby);
    btn.dataset.id=c.id;
    btn.onclick=()=>handleAnswer(c.id);
    grid.appendChild(btn);
  });
  return grid;
}

function handleAnswer(chosenId){
  if(answered)return;
  answered=true;selectedId=chosenId;
  const cur=questions[qIndex];
  const isCorrect=chosenId===cur.id;
  if(isCorrect){score++;playSound('correct');}
  else{wrongCount++;playSound('wrong');}
  document.getElementById('score-chip').textContent='⭐ '+score;

  // 選択肢ボタンを色更新
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    const id=parseInt(btn.dataset.id,10);
    if(id===cur.id)btn.className='choice-btn correct';
    else if(id===selectedId)btn.className='choice-btn wrong';
    else btn.className='choice-btn neutral';
    btn.onclick=null;
  });

  // 地図モードは地図を色付き版に差し替え
  if(currentMode==='mapFind'||currentMode==='mapName'){
    const oldMap=document.querySelector('.map-wrap');
    if(oldMap)oldMap.replaceWith(buildMap(cur.id,true,cur.id,selectedId,false));
  }

  // フィードバック
  const fb=document.createElement('div');
  fb.className='fb '+(isCorrect?'correct':'wrong');
  fb.textContent=isCorrect?'🎉 せいかい！':'❌ ざんねん… 正解は「'+cur.name+'」だよ';
  document.getElementById('quiz-content').appendChild(fb);

  const nb=document.getElementById('btn-next');
  nb.style.display='block';
  nb.textContent=(qIndex+1>=questions.length)?'🏁 けっかをみる':'つぎ →';
}

function nextQuestion(){
  if(qIndex+1>=questions.length){
    saveScore({date:new Date().toLocaleDateString('ja-JP'),mode:currentMode==='silhouette'?'シルエット':currentMode==='mapFind'?'場所あて':'県名あて',count:questions.length,score,wrong:wrongCount});
    showResult();
  }else{
    qIndex++;answered=false;selectedId=null;renderQuestion();
  }
}

function showResult(){
  showScreen('result');
  const total=questions.length,pct=Math.round(score/total*100);
  document.getElementById('result-score').textContent=score;
  document.getElementById('result-total').textContent='/ '+total;
  document.getElementById('stat-correct').textContent=score;
  document.getElementById('stat-wrong').textContent=wrongCount;
  document.getElementById('stat-pct').textContent=pct+'%';
  const msgs=[[100,'🏆 かんぺき！！'],[80,'🌟 すばらしい！'],[60,'😊 よくできました！'],[40,'💪 もう少し！'],[0,'🌱 れんしゅうしよう！']];
  document.getElementById('result-msg').textContent=msgs.find(([t])=>pct>=t)[1];
}

function showScores(){
  showScreen('scores');
  const scores=loadScores();
  const list=document.getElementById('scores-list');
  if(!scores.length){list.innerHTML='<p style="text-align:center;color:#94a3b8;padding:32px">まだきろくがないよ！</p>';return;}
  list.innerHTML='<div class="scores-list">'+scores.slice(0,20).map((s,i)=>`
    <div class="score-row">
      <span class="score-rank">#${i+1}</span>
      <div class="score-info"><div class="score-mode">${s.mode}（${s.count}問）</div><div class="score-date">${s.date}</div></div>
      <div class="score-result"><span class="ok">${s.score}</span><span class="tot">/${s.count}</span></div>
    </div>`).join('')+'</div>';
}
</script>
